<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%"  stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </radialGradient>
    <linearGradient id="arc" x1="0%" y1="100%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f7931a"/>
      <stop offset="50%"  stop-color="#00d084"/>
      <stop offset="100%" stop-color="#f7931a"/>
    </linearGradient>
    <radialGradient id="btcGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffb347"/>
      <stop offset="70%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#c86a00"/>
    </radialGradient>
    <radialGradient id="lqGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#6bffb5"/>
      <stop offset="70%" stop-color="#00d084"/>
      <stop offset="100%" stop-color="#008652"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Glow layer behind the arc -->
  <path d="M 96 376 Q 256 60, 416 376"
        stroke="url(#arc)" stroke-width="44" fill="none"
        stroke-linecap="round" opacity="0.35" filter="url(#soft)"/>

  <!-- Main parabolic arc: BTC → L-BTC → BTC -->
  <path d="M 96 376 Q 256 60, 416 376"
        stroke="url(#arc)" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- Dashed inner trajectory — movement hint -->
  <path d="M 96 376 Q 256 60, 416 376"
        stroke="#ffffff" stroke-width="3" fill="none"
        stroke-linecap="round" stroke-dasharray="2 14" opacity="0.55"/>

  <!-- Origin BTC node (halo + coin) -->
  <circle cx="96" cy="376" r="40" fill="#f7931a" opacity="0.25" filter="url(#soft)"/>
  <circle cx="96" cy="376" r="28" fill="url(#btcGlow)" stroke="#ffcf80" stroke-width="2"/>
  <text x="96" y="391" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="900"
        font-size="32" fill="#0a0a10">₿</text>

  <!-- Destination BTC node (halo + coin) -->
  <circle cx="416" cy="376" r="40" fill="#f7931a" opacity="0.25" filter="url(#soft)"/>
  <circle cx="416" cy="376" r="28" fill="url(#btcGlow)" stroke="#ffcf80" stroke-width="2"/>
  <text x="416" y="391" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="900"
        font-size="32" fill="#0a0a10">₿</text>

  <!-- Apex: Liquid hop — diamond with glow -->
  <circle cx="256" cy="142" r="34" fill="#00d084" opacity="0.25" filter="url(#soft)"/>
  <g transform="translate(256 142) rotate(45)">
    <rect x="-18" y="-18" width="36" height="36" rx="6"
          fill="url(#lqGlow)" stroke="#9dffd1" stroke-width="2"/>
  </g>
</svg>
